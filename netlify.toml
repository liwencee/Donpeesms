# ── DonPeeSMS – Netlify Configuration ─────────────────────────

[build]
  command       = "npm run build"
  publish       = "public"

[build.environment]
  NODE_VERSION  = "20"
  NPM_VERSION   = "10"
  NODE_ENV      = "production"

# ── Development server ─────────────────────────────────────────
[dev]
  command       = "npm run dev"
  port          = 3000
  targetPort    = 3000
  publish       = "public"

# ── SPA fallback – all routes serve index.html ─────────────────
[[redirects]]
  from   = "/api/*"
  to     = "https://api.donpeesms.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security & caching headers ─────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://embed.tawk.to https://va.tawk.to; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.donpeesms.com wss://; worker-src 'self';"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cache-Control          = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Sitemap & robots ───────────────────────────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type  = "application/xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

