<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DonPeeSMS — Under Maintenance</title>
<meta name="robots" content="noindex"/>
<style>
  :root { --p-400:#A78BFA; --p-500:#8B5CF6; --p-700:#5B21B6; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Poppins', -apple-system, Segoe UI, Roboto, sans-serif;
    background:#050510; color:#F8FAFC; min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:24px;
    background-image: radial-gradient(circle at 30% 20%, rgba(139,92,246,.15), transparent 40%),
                      radial-gradient(circle at 70% 80%, rgba(91,33,182,.15), transparent 40%);
  }
  .card {
    max-width:520px; width:100%; text-align:center;
    background:rgba(13,13,31,.7); border:1px solid #1E1B4B; border-radius:22px;
    padding:48px 34px; box-shadow:0 30px 80px rgba(0,0,0,.5); backdrop-filter:blur(6px);
  }
  .logo {
    width:64px; height:64px; margin:0 auto 24px; border-radius:16px;
    background:linear-gradient(135deg,var(--p-700),var(--p-500));
    display:flex; align-items:center; justify-content:center;
  }
  h1 { font-size:1.8rem; font-weight:800; margin-bottom:14px; letter-spacing:-.5px; }
  p { color:#CBD5E1; line-height:1.7; font-size:1rem; margin-bottom:10px; }
  .sub { color:#64748B; font-size:.88rem; margin-top:22px; }
  .dots { display:inline-flex; gap:6px; margin-top:26px; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--p-500); animation:pulse 1.4s infinite ease-in-out; }
  .dot:nth-child(2){ animation-delay:.2s } .dot:nth-child(3){ animation-delay:.4s }
  @keyframes pulse { 0%,100%{ opacity:.3; transform:scale(.8) } 50%{ opacity:1; transform:scale(1.1) } }
  a { color:var(--p-400); text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="30" height="30" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
    </div>
    <h1>We'll be right back 🛠️</h1>
    <p><strong>DonPeeSMS</strong> is undergoing scheduled maintenance to bring you a better experience.</p>
    <p>Please check back in a little while — your wallet balance and account are safe.</p>
    <div class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="sub">Need help? <a href="https://wa.me/2347084869630">Chat with us on WhatsApp</a></div>
  </div>
</body>
</html>
